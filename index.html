<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>丹港 001</title>
    <meta name="description" content="丹港影片 001">
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7f3eb;
        --muted: #b9c1c7;
        --panel: rgba(13, 17, 23, 0.74);
        --line: rgba(255, 255, 255, 0.18);
        --accent: #e0b15c;
        --bg: #0a0d10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .stage {
        width: min(1180px, 100%);
      }

      .titlebar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 56px);
        font-weight: 700;
        letter-spacing: 0;
      }

      .meta {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 15px;
        white-space: nowrap;
      }

      .player {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #050607;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.4);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #050607;
      }

      .caption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 13px 16px;
        background: var(--panel);
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
      }

      .dot {
        width: 9px;
        height: 9px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 18px rgba(224, 177, 92, 0.64);
      }

      .caption span {
        display: inline-flex;
        align-items: center;
        gap: 9px;
      }

      @media (max-width: 720px) {
        main {
          padding: 14px;
          place-items: start center;
        }

        .titlebar,
        .caption {
          align-items: start;
          flex-direction: column;
        }

        .meta {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="stage" aria-label="丹港影片 001">
        <div class="titlebar">
          <h1>丹港 001</h1>
          <p class="meta">Web 播放版 · 720p</p>
        </div>

        <div class="player">
          <video
            controls
            preload="metadata"
            poster="assets/danhabor-001-cover.jpg"
          >
            <source src="assets/danhabor-001.mp4" type="video/mp4">
          </video>
          <div class="caption">
            <span><i class="dot" aria-hidden="true"></i>丹港影片制作 / 001</span>
            <span>时长 05:14</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
